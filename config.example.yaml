wechat:
  # Default: ~/.wechat-gateway/credentials.json
  # credentials_path: ~/.wechat-gateway/credentials.json
  # Leave empty to auto-capture first message sender
  notify_user: ""

channels:
  webhook:
    enabled: false
    port: 9100
    token: ""  # Optional Bearer token auth; empty = no auth
    endpoints:
      # HomeAssistant notify / rest_command 通用接口
      ha:
        template: "{{message}}"
      # QNAP Notification Center（自定义 SMS 提供商）
      # URL模板: http://<ip>:9100/webhook/qnap?msg=@@Text@@&phone=@@PhoneNumber@@
      qnap:
        template: "{{msg}}"
      # IFTTT Webhooks → 微信（IFTTT action POST 到这个 endpoint）
      ifttt:
        template: "{{message}}"
      # Transmission 下载完成回调
      transmission:
        template: "任务 {{name}} 下载完成（{{size}}）"

  mqtt:
    enabled: false
    broker: mqtt://localhost:1883
    username: ""
    password: ""
    subscribe:
      - topic: wechat/notify/plain
        tag: ha
    commands:
      ha:
        topic: wechat/command

  llm:
    deepseek:
      enabled: false
      base_url: https://api.deepseek.com
      model: deepseek-chat
      api_key_env: DEEPSEEK_API_KEY
      system_prompt: "简洁回答问题。"
    gpt:
      enabled: false
      base_url: https://api.openai.com/v1
      model: gpt-4o
      api_key_env: OPENAI_API_KEY
      system_prompt: ""

  openclaw:
    enabled: false
    port: 9200
    token: "my-secret"

  # IFTTT: 微信 → IFTTT Maker Webhooks（/ifttt event message）
  ifttt:
    enabled: false
    key: "your-ifttt-webhooks-key"  # https://ifttt.com/maker_webhooks → Documentation
